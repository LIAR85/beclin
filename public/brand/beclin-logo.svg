<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Be Clin Expertos Lavando</title>
  <desc id="desc">Logo oficial con texto azul y estrellas amarillas para Be Clin.</desc>

  <defs>
    <linearGradient id="circleBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9fdefa" />
      <stop offset="100%" stop-color="#6abfe8" />
    </linearGradient>
    <linearGradient id="brandBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4cb2" />
      <stop offset="100%" stop-color="#1f65d0" />
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#ffffff" />

  <g filter="url(#logoShadow)">
    <circle cx="242" cy="206" r="118" fill="url(#circleBlue)" />
    <text x="242" y="240" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="126" font-weight="700" fill="#ffffff">
      be
    </text>
  </g>

  <g fill="url(#brandBlue)" font-family="Poppins, Arial, sans-serif" font-weight="700" filter="url(#logoShadow)">
    <text x="306" y="496" font-size="318" letter-spacing="2">clin</text>
    <text x="600" y="640" text-anchor="middle" font-size="86" letter-spacing="8">EXPERTOS LAVANDO</text>
  </g>

  <g fill="#ffc700" filter="url(#logoShadow)">
    <path d="M806 136c6 0 11 4 12 9l9 40a10 10 0 0 0 7 7l40 9c5 1 9 6 9 12s-4 11-9 12l-40 9a10 10 0 0 0-7 7l-9 40c-1 5-6 9-12 9s-11-4-12-9l-9-40a10 10 0 0 0-7-7l-40-9c-5-1-9-6-9-12s4-11 9-12l40-9a10 10 0 0 0 7-7l9-40c1-5 6-9 12-9Z" />
    <path d="M885 82c4 0 7 2 8 6l6 25a8 8 0 0 0 5 5l25 6c4 1 6 4 6 8s-2 7-6 8l-25 6a8 8 0 0 0-5 5l-6 25c-1 4-4 6-8 6s-7-2-8-6l-6-25a8 8 0 0 0-5-5l-25-6c-4-1-6-4-6-8s2-7 6-8l25-6a8 8 0 0 0 5-5l6-25c1-4 4-6 8-6Z" />
